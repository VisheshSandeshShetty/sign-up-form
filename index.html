<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="image-section"></div>
    <div class="form-section">
        <h3>This is not a real online service and <u>submitting will lead to <strong>a special present</strong></u>... Sign up now to get started and claim your prize!</h3>
        <h1>Enter Required Details below: </h1>
        <form action="https://www.youtube.com/watch?v=dQw4w9WgXcQ" method="post">
            <div class="input-group"><label for="first_name">*FIRST NAME:</label></div>
            <div class="input-group"><input type="text" id="first_name" required></div>
            <div class="input-group"><label for="last_name">LAST NAME:</label></div>
            <div class="input-group"><input type="text" id="last_name"></div>
            <div class="input-group"><label for="email">*EMAIL</label></div>
            <div class="input-group"><input type="email" id="email" placeholder="user@example.com" required></div>
            <div class="input-group"><label for="phone_number">*PHONE NUMBER</label></div>
            <div class="input-group"><input type="tel" id="phone_number" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" placeholder="10 digit numbers only" required></div>
            <div class="input-group"><label for="user_password">*PASSWORD</label></div>
            <div class="input-group"><input type="password" id="user_password" required></div>
            <div>
                <button type="submit">SUBMIT</button>
            </div>
        </form>
    </div>
</body>
</html>
